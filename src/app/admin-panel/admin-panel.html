<div class="studio-bg">

  <!-- OG NAVBAR -->
  <header class="top-nav">
    <div class="nav-left">
      <span class="brand">devinci</span>
    </div>
  </header>

  <div class="studio-shell">

    <!-- OG LEFT PANEL -->
    <div class="control-panel">

      <h2 class="logo-title" style="font-size: 24px;">
        User Database
      </h2>

      <!-- ONLY SCROLL AREA -->
      <div class="table-scroll">

        <table class="admin-table">
          <thead>
            <tr>
              <th>Email</th>
              <th>Created At</th>
            </tr>
          </thead>

          <tbody>
            <tr *ngFor="let u of users">
              <td>{{ u.email }}</td>
              <td>{{ u.createdAt | date:'medium' }}</td>
            </tr>
          </tbody>
        </table>

      </div>

    </div>

  </div>
</div>
